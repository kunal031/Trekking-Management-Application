databases:
  - name: tma-db
    databaseName: tma
    user: tma
    plan: free

services:
  - type: redis
    name: tma-redis
    plan: free
    ipAllowList: [] # Allows internal connections within Render

  - type: web
    name: tma-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tma-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tma-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: tma-frontend
    env: static
    buildCommand: "cd frontend && npm install && VITE_API_BASE_URL=https://$BACKEND_URL/api/v1 npm run build"
    staticPublishPath: "./frontend/dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: tma-backend
          property: hostport
